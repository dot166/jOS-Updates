# Simple workflow for deploying static content to GitHub Pages
name: Deploy updates to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: wait for release script
        shell: bash
        run: |
          sleep 1200s
      - name: Update Checkout
        shell: bash
        run: git pull
      - name: Pull Update Files from Releases
        shell: bash
        run: |
          DEVICES=("oriole" "felix")
          CHANNELS=("stable" "beta")

          for device in "${DEVICES[@]}"; do
            for channel in "${CHANNELS[@]}"; do
              FILE_PATH="${device}-${channel}"

              # Check if the file exists before trying to read it
              if [ -f "$FILE_PATH" ]; then
                release=$(cat "$FILE_PATH")
                VERSION=${release// */}

                echo "Downloading ${device} (${channel})..."
                wget --no-parent "https://github.com/dot166/jOS-Updates/releases/download/$VERSION/${device}-ota_update-$VERSION.zip"
              else
                echo "No update file found for $FILE_PATH, skipping."
              fi
            done
          done
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
